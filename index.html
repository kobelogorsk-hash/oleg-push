<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameMarket - Маркетплейс игровых товаров и услуг</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Фоновые элементы для Glassmorphism -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <div class="container">
        <!-- Хедер -->
        <header class="glass-panel">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🎮</span>
                    <h1>GameMarket</h1>
                </div>
                <nav class="main-nav">
                    <a href="#" class="nav-link active" data-category="all">Все товары</a>
                    <a href="#" class="nav-link" data-category="currency">Валюта</a>
                    <a href="#" class="nav-link" data-category="items">Предметы</a>
                    <a href="#" class="nav-link" data-category="accounts">Аккаунты</a>
                    <a href="#" class="nav-link" data-category="boosting">Бустинг</a>
                    <a href="#" class="nav-link" data-category="services">Услуги</a>
                </nav>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Поиск товаров...">
                        <button class="search-btn">🔍</button>
                    </div>
                    <button class="cart-btn" id="cartBtn">
                        <span class="cart-icon">🛒</span>
                        <span class="cart-count" id="cartCount">0</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Фильтры -->
        <aside class="filters-section glass-panel">
            <h3>🏷️ Категории игр</h3>
            <div class="filter-group">
                <label class="filter-checkbox">
                    <input type="checkbox" name="game" value="wow" checked>
                    <span class="checkmark"></span>
                    World of Warcraft
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="game" value="cs2" checked>
                    <span class="checkmark"></span>
                    Counter-Strike 2
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="game" value="dota2" checked>
                    <span class="checkmark"></span>
                    Dota 2
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="game" value="lostark" checked>
                    <span class="checkmark"></span>
                    Lost Ark
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="game" value="pathofexile" checked>
                    <span class="checkmark"></span>
                    Path of Exile
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="game" value="escape" checked>
                    <span class="checkmark"></span>
                    Escape from Tarkov
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="game" value="genshin" checked>
                    <span class="checkmark"></span>
                    Genshin Impact
                </label>
                <label class="filter-checkbox">
                    <input type="checkbox" name="game" value="lineage" checked>
                    <span class="checkmark"></span>
                    Lineage 2
                </label>
            </div>
            
            <h3>💰 Цена</h3>
            <div class="price-range">
                <div class="range-inputs">
                    <input type="number" id="minPrice" placeholder="От" min="0">
                    <span>—</span>
                    <input type="number" id="maxPrice" placeholder="До" min="0">
                </div>
                <input type="range" id="priceRange" min="0" max="100000" step="100" value="100000">
            </div>

            <h3>⭐ Рейтинг продавца</h3>
            <div class="filter-group">
                <label class="filter-radio">
                    <input type="radio" name="rating" value="all" checked>
                    <span class="radio-mark"></span>
                    Любой рейтинг
                </label>
                <label class="filter-radio">
                    <input type="radio" name="rating" value="4">
                    <span class="radio-mark"></span>
                    4+ ⭐
                </label>
                <label class="filter-radio">
                    <input type="radio" name="rating" value="4.5">
                    <span class="radio-mark"></span>
                    4.5+ ⭐
                </label>
                <label class="filter-radio">
                    <input type="radio" name="rating" value="5">
                    <span class="radio-mark"></span>
                    5.0 ⭐
                </label>
            </div>

            <button class="apply-filters-btn" id="applyFilters">Применить фильтры</button>
        </aside>

        <!-- Основной контент -->
        <main class="main-content">
            <div class="products-header">
                <h2 id="categoryTitle">🎮 Все товары</h2>
                <div class="sort-options">
                    <span>Сортировать:</span>
                    <select id="sortSelect">
                        <option value="popular">По популярности</option>
                        <option value="price_asc">Цена: по возрастанию</option>
                        <option value="price_desc">Цена: по убыванию</option>
                        <option value="rating">По рейтингу</option>
                        <option value="newest">Новинки</option>
                    </select>
                </div>
            </div>

            <div id="productsGrid" class="products-grid"></div>
            
            <div class="load-more">
                <button id="loadMoreBtn" class="load-more-btn">Загрузить ещё</button>
            </div>
        </main>
    </div>

    <!-- Модальное окно корзины -->
    <div class="modal-overlay hidden" id="cartModal">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h2>🛒 Корзина</h2>
                <button class="close-modal" id="closeCart">&times;</button>
            </div>
            <div class="modal-body">
                <div id="cartItems" class="cart-items"></div>
                <div class="cart-empty hidden" id="cartEmpty">
                    <span class="empty-icon">🛒</span>
                    <p>Корзина пуста</p>
                </div>
            </div>
            <div class="modal-footer">
                <div class="cart-total">
                    <span>Итого:</span>
                    <span class="total-price" id="cartTotal">0 ₽</span>
                </div>
                <button class="checkout-btn" id="checkoutBtn">Оформить заказ</button>
            </div>
        </div>
    </div>

    <!-- Уведомления -->
    <div class="notifications" id="notifications"></div>

    <script src="app.js"></script>
</body>
</html>
